name: Run LinkedIn Scraper & Prepare Data

on:
  schedule:
    - cron: "0 5 13,28 * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper & Prepare Data
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          python scraper.py
          python dataWrangler.py
