name: LLM + Taxonomy + Mapping

on:
  schedule:
    - cron: "0 5 */2 * *"
  workflow_dispatch: {}

concurrency:
  group: llm-taxonomy-mapping
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      OLLAMA_HOST: http://127.0.0.1:11434
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in {1..60}; do
            if curl -sf "${OLLAMA_HOST}/api/tags" > /dev/null; then
              echo "Ollama listo en ${OLLAMA_HOST}"
              exit 0
            fi
            sleep 2
          done
          echo "Ollama no arranco a tiempo"
          cat /tmp/ollama.log || true
          exit 1

      - name: Pull embedding model
        run: |
          ollama pull mxbai-embed-large:latest

      - name: Run LLM Processor (continua aunque falle)
        continue-on-error: true
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Iniciando llm_processor..."
          python llm_processor.py
          echo "llm_processor finalizado."

      - name: Index taxonomy (siempre)
        if: ${{ always() }}
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          python -m rag.index_taxonomy
          python -m rag.index_technology_taxonomy

      - name: Map offers (siempre)
        if: ${{ always() }}
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          python -m rag.map_offers
