x-build-args: &build-defaults
  DOCKER_BUILDKIT: "0"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    pull_policy: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    pull_policy: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 8

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/nexTalent}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      PORT: ${PORT:-8080}
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8787:8080"
    volumes:
      - chroma_data:/app/data/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 8

  web:
    build:
      context: .
      dockerfile: web/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  mongo_data:
  ollama_data:
  chroma_data:
